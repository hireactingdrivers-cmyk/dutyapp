<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blossom Driver Pro</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #0f172a; 
            margin: 0; padding: 15px; 
            display: flex; justify-content: center;
            color: #f8fafc;
        }
        .app-container { 
            width: 100%; max-width: 450px; 
            background: #1e293b; border-radius: 30px; 
            min-height: 90vh; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        section { padding: 25px; }
        
        /* Selection Buttons */
        .role-btn-container { 
            margin-top: 50px; display: flex; flex-direction: column; gap: 30px; align-items: center;
        }
        .round-btn { 
            width: 160px; height: 160px; border-radius: 50%; border: none; 
            color: white; font-weight: 900; font-size: 20px;
            cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            touch-action: manipulation;
        }
        #goToAdmin { background: #334155; }
        #goToDriver { background: #059669; }

        /* General UI */
        input, textarea { 
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; 
            border: none; background: #334155; color: white; font-size: 16px;
        }
        button { 
            width: 100%; padding: 15px; border: none; border-radius: 12px; 
            font-weight: bold; cursor: pointer;
        }
        #postBtn { background: #2563eb; color: white; }
        .duty-card { 
            background: #334155; border-left: 8px solid #059669; 
            padding: 20px; margin-bottom: 15px; border-radius: 15px;
        }
        .accept-btn { background: #10b981; color: white; margin-top: 10px; width: auto; padding: 10px 30px; }
        .back-btn { background: transparent; color: #94a3b8; width: auto; text-align: left; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="selectionPage">
        <h1 style="text-align:center; margin-top:60px;">Blossom Drivers</h1>
        <div class="role-btn-container">
            <button class="round-btn" onclick="showPage('admin')">🎛️<br>ADMIN</button>
            <button class="round-btn" onclick="showPage('driver')">𚖇<br>DRIVER</button>
        </div>
    </div>

    <div id="mainContent" style="display:none;">
        <button class="back-btn" onclick="location.reload()">⬅ Back</button>
        
        <section id="adminSection" style="display:none;">
            <h2>Admin Panel</h2>
            <input type="password" id="passInput" placeholder="Password">
            <button style="background:#475569; color:white;" onclick="login()">Login</button>
            
            <div id="adminPanel" style="display:none; margin-top:20px;">
                <input type="text" id="areaName" placeholder="Pickup Area">
                <textarea id="taskDesc" rows="3" placeholder="Duty Details"></textarea>
                <button id="postBtn" onclick="postDuty()">POST DUTY</button>
                <div id="historyArea" style="margin-top:20px;"></div>
            </div>
        </section>

        <section id="driverSection" style="display:none;">
            <h2>Live Duties</h2>
            <div id="feedArea"></div>
        </section>
    </div>
</div>

<audio id="notifSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, onChildChanged, onChildRemoved, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAh2o5OHBjOkaaYB9cJu1LoJ8l8KVRcnMA",
        authDomain: "mydriverapp-1c155.firebaseapp.com",
        projectId: "mydriverapp-1c155",
        databaseURL: "https://mydriverapp-1c155-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dutyRef = ref(db, 'duties');
    const audio = document.getElementById('notifSound');

    // CONFIG
    const botToken = "8385530049:AAEe6TtUyK7lcjlgz0vzr8u3on61MY3AABo";
    const groupChatId = "-1003800327361";

    // AUDIO & NOTIFICATION INIT
    window.showPage = (role) => {
        // Audio permission fix
        audio.play().then(() => { audio.pause(); audio.currentTime = 0; }).catch(() => {});
        if ("Notification" in window) Notification.requestPermission();
        
        document.getElementById('selectionPage').style.display = "none";
        document.getElementById('mainContent').style.display = "block";
        document.getElementById(role + 'Section').style.display = "block";
    };

    window.login = () => {
        if(document.getElementById('passInput').value === "divya") {
            document.getElementById('adminPanel').style.display = "block";
        }
    };

    window.postDuty = async () => {
        const area = document.getElementById('areaName').value;
        const desc = document.getElementById('taskDesc').value;
        if(area && desc) {
            push(dutyRef, { area, description: desc, acceptedBy: "", timestamp: Date.now() });
            // Telegram Alert (No Link)
            const msg = `𚖇 *NEW DUTY ALERT*%0A📍 Area: ${area}%0A📝 Details: ${desc}`;
            await fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${groupChatId}&text=${msg}&parse_mode=Markdown`);
            document.getElementById('areaName').value = ""; document.getElementById('taskDesc').value = "";
        }
    };

    onChildAdded(dutyRef, (snap) => {
        render(snap);
        // Sound & Vibration Alert for new duties
        if (Date.now() - snap.val().timestamp < 15000) {
            audio.play().catch(() => {});
            if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
            if (Notification.permission === "granted") {
                new Notification("New Duty Alert!", { body: snap.val().area });
            }
        }
    });

    onChildChanged(dutyRef, (snap) => render(snap));
    onChildRemoved(dutyRef, (snap) => {
        document.getElementById(`f_${snap.key}`)?.remove();
        document.getElementById(`h_${snap.key}`)?.remove();
    });

    function render(snap) {
        const id = snap.key, data = snap.val();
        // Driver Feed
        let f = document.getElementById(`f_${id}`);
        if(!f) { f = document.createElement('div'); f.id = `f_${id}`; f.className='duty-card'; document.getElementById('feedArea').prepend(f); }
        f.innerHTML = `<b>📍 ${data.area}</b><p>${data.description}</p>` + 
            (data.acceptedBy ? `✅ Accepted by ${data.acceptedBy}` : `<input id="n_${id}" placeholder="Your Name"><button class="accept-btn" onclick="accept('${id}')">ACCEPT DUTY</button>`);
        
        // Admin History
        let h = document.getElementById(`h_${id}`);
        if(!h) { h = document.createElement('div'); h.id = `h_${id}`; h.className='duty-card'; h.style.borderLeftColor="#94a3b8"; document.getElementById('historyArea').prepend(h); }
        h.innerHTML = `<b>${data.area}</b> ${data.acceptedBy ? '✅' : '⏳'} <button onclick="del('${id}')" style="width:auto; float:right; background:transparent; color:#ef4444;">🗑️</button>`;
    }

    window.accept = (id) => {
        const n = document.getElementById(`n_${id}`).value;
        if(n) update(ref(db, `duties/${id}`), { acceptedBy: n });
    };

    window.del = (id) => { if(confirm("Delete?")) remove(ref(db, `duties/${id}`)); };
</script>
</body>
</html>
