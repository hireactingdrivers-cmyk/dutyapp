<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Driver Duty Pro - Secure Edition</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 10px; }
        .app-container { max-width: 500px; margin: auto; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); min-height: 90vh; }
        section { padding: 20px; }
        h2 { color: #333; font-size: 18px; margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        
        /* Selection Page Styles */
        #selectionPage { text-align: center; padding: 60px 20px; }
        .role-btn-container { display: flex; flex-direction: column; gap: 30px; align-items: center; margin-top: 40px; }
        .round-btn { width: 130px; height: 130px; border-radius: 50%; border: none; font-size: 16px; cursor: pointer; color: white; box-shadow: 0 5px 15px rgba(0,0,0,0.2); transition: 0.3s; }
        .round-btn:active { transform: scale(0.95); }
        #goToAdmin { background: #333; }
        #goToDriver { background: #25d366; }

        /* Existing Styles */
        .ready-card { background: #e0f2fe; border: 2px solid #0ea5e9; padding: 15px; border-radius: 12px; margin-bottom: 15px; text-align: center; }
        .ready-btn { background: #25d366; color: white; margin-top: 10px; }
        #adminBtn { background: #333; color: white; }
        #postBtn { background: #007bff; color: white; }
        .duty-card { background: #fff; border-left: 5px solid #007bff; padding: 15px; margin-bottom: 10px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .driver-action { margin-top: 10px; display: flex; gap: 5px; }
        .accept-btn { width: auto; background: #28a745; color: white; padding: 8px 15px; }
        .delete-btn { background: #dc3545; color: white; padding: 5px 10px; width: auto; font-size: 12px; margin-top: 5px; }
        .history-card { border-left: 5px solid #6c757d; font-size: 14px; background: #fafafa; }
        .accepted-tag { color: #28a745; font-weight: bold; display: block; margin-top: 5px; }
        hr { border: 0; height: 8px; background: #f0f2f5; margin: 0; }
        #soundStatus { font-size: 10px; color: green; margin-top: 5px; display: none; }
        .wa-share-btn { background: #25d366; color: white; margin-top: 8px; width: 100%; }
        .back-btn { background: none; color: #007bff; width: auto; font-size: 14px; text-align: left; padding: 10px; }
    </style>
</head>
<body>

<div class="app-container">
    
    <div id="selectionPage">
        <h1 style="color: #333; margin-bottom: 10px;">Driver Duty Pro</h1>
        <p style="color: #666;">Choose your access mode</p>
        <div class="role-btn-container">
            <button class="round-btn" id="goToAdmin">🎛️<br>ADMIN<br>LOGIN</button>
            <button class="round-btn" id="goToDriver">🚖<br>DRIVER<br>ENTRY</button>
        </div>
    </div>

    <div id="mainContent" style="display:none;">
        <button class="back-btn" onclick="location.reload()">⬅ Back to Home</button>

        <section id="adminSection" style="display:none;">
            <h2>🎛️ Admin Control</h2>
            <div id="adminLoginArea">
                <input type="password" id="passInput" placeholder="Enter Admin Password">
                <button id="adminBtn">Login (Unlock Panel)</button>
            </div>
            <div id="adminPanel" style="display:none;">
                <div id="soundStatus">🔊 Sound Alert Active</div>
                <input type="text" id="areaName" placeholder="Pickup Area">
                <textarea id="taskDesc" rows="2" placeholder="Duty Details"></textarea>
                <button id="postBtn">Post Duty & Alert Telegram</button>
                <br><br>
                <h2 style="color:red;">📜 Duty History</h2>
                <div id="historyArea"></div>
            </div>
        </section>

        <section id="driverSection" style="display:none;">
            <div class="ready-card">
                <h3 style="margin:0; color:#0369a1; font-size:16px;">Are you Ready for Duty?</h3>
                <input type="text" id="readyName" placeholder="Enter Your Name">
                <input type="text" id="readyLoc" placeholder="Current Area/Location">
                <button class="ready-btn" onclick="informReady()">I AM READY (WhatsApp Admin)</button>
            </div>
            <hr style="margin: 20px -20px;">
            <h2>📱 Live Duty Feed</h2>
            <div id="feedArea"></div>
        </section>
    </div>

</div>

<audio id="notifSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, onChildChanged, onChildRemoved, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAh2o5OHBjOkaaYB9cJu1LoJ8l8KVRcnMA",
        authDomain: "mydriverapp-1c155.firebaseapp.com",
        projectId: "mydriverapp-1c155",
        databaseURL: "https://mydriverapp-1c155-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dutyRef = ref(db, 'duties');
    const audio = document.getElementById('notifSound');
    const myWhatsApp = "919500005402";

    const botToken = "8385530049:AAEe6TtUyK7lcjlgz0vzr8u3on61MY3AABo";
    const groupChatId = "-1003800327361"; 

    // --- NAVIGATION LOGIC ---
    const selPage = document.getElementById('selectionPage');
    const mainCont = document.getElementById('mainContent');
    const admSec = document.getElementById('adminSection');
    const drvSec = document.getElementById('driverSection');

    document.getElementById('goToAdmin').addEventListener('click', () => {
        selPage.style.display = "none";
        mainCont.style.display = "block";
        admSec.style.display = "block";
    });

    document.getElementById('goToDriver').addEventListener('click', () => {
        selPage.style.display = "none";
        mainCont.style.display = "block";
        drvSec.style.display = "block";
    });

    // --- ADMIN LOGIN ---
    document.getElementById('adminBtn').addEventListener('click', () => {
        if (document.getElementById('passInput').value === "divya") {
            document.getElementById('adminLoginArea').style.display = "none";
            document.getElementById('adminPanel').style.display = "block";
            document.getElementById('soundStatus').style.display = "block";
            audio.play().then(() => { audio.pause(); audio.currentTime = 0; }).catch(e => {});
        } else { alert("Wrong Password!"); }
    });

    // --- DUTY LOGIC ---
    document.getElementById('postBtn').addEventListener('click', async () => {
        const area = document.getElementById('areaName').value;
        const desc = document.getElementById('taskDesc').value;
        const realAppLink = window.location.href;

        if (area && desc) {
            push(dutyRef, { area, description: desc, acceptedBy: "", timestamp: Date.now() });
            const msg = `🚖 *NEW DUTY ALERT*%0A%0A📍 *Area:* ${area}%0A📝 *Details:* ${desc}%0A%0A📲 *Accept Here:*%0A${realAppLink}`;
            const teleUrl = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${groupChatId}&text=${msg}&parse_mode=Markdown`;
            try { await fetch(teleUrl); alert("Posted!"); } catch (e) { alert("Telegram Error!"); }
            document.getElementById('areaName').value = ""; document.getElementById('taskDesc').value = "";
        } else { alert("Fill details!"); }
    });

    onChildAdded(dutyRef, (snap) => renderDuty(snap));
    onChildChanged(dutyRef, (snap) => renderDuty(snap));

    function renderDuty(snap) {
        const id = snap.key, data = snap.val();
        let feedCard = document.getElementById(`feed_${id}`);
        if(!feedCard) {
            feedCard = document.createElement('div');
            feedCard.id = `feed_${id}`;
            feedCard.className = 'duty-card';
            document.getElementById('feedArea').prepend(feedCard);
            if (Date.now() - (data.timestamp || 0) < 10000) { audio.play().catch(e => {}); }
        }
        updateFeedUI(feedCard, id, data);

        let histCard = document.getElementById(`hist_${id}`);
        if(!histCard) {
            histCard = document.createElement('div');
            histCard.id = `hist_${id}`;
            histCard.className = 'duty-card history-card';
            document.getElementById('historyArea').prepend(histCard);
        }
        updateHistoryUI(histCard, id, data);
    }

    function updateFeedUI(card, id, data) {
        let actionHtml = data.acceptedBy ? 
            `<span class="accepted-tag">✅ Accepted: ${data.acceptedBy}</span><button class="wa-share-btn" onclick="window.open('https://wa.me/${myWhatsApp}?text=${encodeURIComponent('Accepted: '+data.area)}', '_blank')">SHARE TO WHATSAPP</button>` :
            `<div class="driver-action"><input type="text" id="name_${id}" placeholder="Your Name" style="margin:0; flex:1;"><button class="accept-btn" onclick="window.acceptDuty('${id}')">Accept</button></div>`;
        card.innerHTML = `<strong>📍 ${data.area}</strong><p style="margin:5px 0;">${data.description}</p>${actionHtml}`;
    }

    function updateHistoryUI(card, id, data) {
        card.innerHTML = `<strong>${data.area}</strong> ${data.acceptedBy ? '(✅)' : '(⏳)'}<br><button class="delete-btn" onclick="window.deleteDuty('${id}')">🗑️ Delete</button>`;
    }

    onChildRemoved(dutyRef, (snap) => {
        document.getElementById(`feed_${snap.key}`)?.remove();
        document.getElementById(`hist_${snap.key}`)?.remove();
    });

    window.acceptDuty = (id) => {
        const name = document.getElementById(`name_${id}`).value;
        if (name) update(ref(db, `duties/${id}`), { acceptedBy: name }); else alert("Enter name!");
    };

    window.deleteDuty = (id) => { if(confirm("Delete?")) remove(ref(db, `duties/${id}`)); };

    window.informReady = () => {
        const name = document.getElementById('readyName').value, loc = document.getElementById('readyLoc').value;
        if (name && loc) window.open(`https://wa.me/${myWhatsApp}?text=DRIVER READY: ${name} @ ${loc}`, '_blank');
        else alert("Fill details!");
    };
</script>
</body>
</html>
