<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blossom Driver Duty</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #0f172a, #1e40af); 
            margin: 0; 
            padding: 15px; 
            display: flex; 
            justify-content: center;
            color: #333;
            min-height: 100vh;
        }
        .app-container { 
            width: 100%; 
            max-width: 450px; 
            background: #f8fafc; 
            border-radius: 30px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            overflow: hidden;
            position: relative;
            height: fit-content;
            margin-top: 20px;
        }
        section { padding: 25px; }

        /* SELECTION PAGE */
        #selectionPage { text-align: center; padding: 60px 20px; }
        .role-btn-container { 
            margin-top: 50px; 
            display: flex; 
            flex-direction: column; 
            gap: 35px; 
            align-items: center;
        }
        .round-btn { 
            width: 170px; height: 170px; 
            border-radius: 50%; border: none; 
            color: white; font-weight: 900; font-size: 20px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            transition: 0.3s;
            touch-action: manipulation;
        }
        #goToAdmin { background: #1e293b; border: 4px solid #334155; }
        #goToDriver { background: #059669; border: 4px solid #10b981; }
        .round-btn:active { transform: scale(0.9); }

        /* FORMS */
        input, textarea { 
            width: 100%; padding: 15px; margin: 12px 0; 
            border: 2px solid #cbd5e1; border-radius: 15px; 
            box-sizing: border-box; font-size: 16px;
        }
        button { 
            width: 100%; padding: 16px; border: none; 
            border-radius: 15px; font-weight: bold; font-size: 16px;
            cursor: pointer; transition: 0.2s;
        }
        #postBtn { background: #2563eb; color: white; margin-top: 10px; }
        #adminBtn { background: #1e293b; color: white; }
        
        /* DUTY CARDS */
        .duty-card { 
            background: white; border-left: 8px solid #2563eb; 
            padding: 20px; margin-bottom: 15px; border-radius: 15px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .accept-btn { background: #059669; color: white; width: auto; padding: 12px 25px; margin-top: 10px; }
        .back-btn { background: #e2e8f0; color: #1e293b; margin-bottom: 20px; width: auto; font-size: 14px; }
        .ready-card { background: #dcfce7; border: 2px solid #059669; padding: 20px; border-radius: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="selectionPage">
        <h1 style="color:#1e293b; font-size: 32px; margin-bottom: 10px;">Blossom Drivers</h1>
        <p style="color: #64748b; font-weight: 500;">Select Mode to Continue</p>
        <div class="role-btn-container">
            <button class="round-btn" id="goToAdmin">
                <span style="font-size:50px;">👤</span><br>ADMIN
            </button>
            <button class="round-btn" id="goToDriver">
                <span style="font-size:50px;">🚖</span><br>DRIVER
            </button>
        </div>
    </div>

    <div id="mainContent" style="display:none;">
        <button class="back-btn" onclick="location.reload()">⬅ Back / Logout</button>

        <section id="adminSection" style="display:none;">
            <h2 style="margin-top:0;">Admin Panel</h2>
            <div id="adminLoginArea">
                <input type="password" id="passInput" placeholder="Password">
                <button id="adminBtn" onclick="checkPass()">Login</button>
            </div>
            <div id="adminPanel" style="display:none;">
                <input type="text" id="areaName" placeholder="Pickup Area (eg: OMR)">
                <textarea id="taskDesc" rows="3" placeholder="Duty Details..."></textarea>
                <button id="postBtn" onclick="postDuty()">Post Duty to Telegram</button>
                <h3 style="margin-top:30px; color:#ef4444;">Duty History</h3>
                <div id="historyArea"></div>
            </div>
        </section>

        <section id="driverSection" style="display:none;">
            <div class="ready-card">
                <h3 style="margin-top:0; color:#065f46;">Driver Status</h3>
                <input type="text" id="readyName" placeholder="Your Name">
                <input type="text" id="readyLoc" placeholder="Your Location">
                <button style="background:#059669; color:white;" onclick="informReady()">SEND READY STATUS</button>
            </div>
            <h3 style="margin-top:30px;">Live Duty Feed</h3>
            <div id="feedArea"></div>
        </section>
    </div>
</div>

<audio id="notifSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, onChildChanged, onChildRemoved, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAh2o5OHBjOkaaYB9cJu1LoJ8l8KVRcnMA",
        authDomain: "mydriverapp-1c155.firebaseapp.com",
        projectId: "mydriverapp-1c155",
        databaseURL: "https://mydriverapp-1c155-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dutyRef = ref(db, 'duties');
    const audio = document.getElementById('notifSound');

    const myWhatsApp = "919500005402";
    const botToken = "8385530049:AAEe6TtUyK7lcjlgz0vzr8u3on61MY3AABo";
    const groupChatId = "-1003800327361";
    const myWebAppUrl = "https://mydriverapp-1c155.firebaseapp.com/";

    // --- NOTIFICATION & SOUND FIX ---
    function initPermissions() {
        if ("Notification" in window) {
            Notification.requestPermission();
        }
        audio.play().then(() => { audio.pause(); }).catch(e => {});
    }

    // --- NAVIGATION ---
    window.showPage = (role) => {
        initPermissions();
        document.getElementById('selectionPage').style.display = "none";
        document.getElementById('mainContent').style.display = "block";
        if(role === 'admin') document.getElementById('adminSection').style.display = "block";
        else document.getElementById('driverSection').style.display = "block";
    };

    document.getElementById('goToAdmin').onclick = () => window.showPage('admin');
    document.getElementById('goToDriver').onclick = () => window.showPage('driver');

    // --- ADMIN LOGIC ---
    window.checkPass = () => {
        if(document.getElementById('passInput').value === "divya") {
            document.getElementById('adminLoginArea').style.display = "none";
            document.getElementById('adminPanel').style.display = "block";
        } else { alert("Wrong Password!"); }
    };

    window.postDuty = async () => {
        const area = document.getElementById('areaName').value;
        const desc = document.getElementById('taskDesc').value;
        if(area && desc) {
            push(dutyRef, { area, description: desc, acceptedBy: "", timestamp: Date.now() });
            const msg = `🚖 *NEW BLOSSOM DUTY*%0A📍 Area: ${area}%0A📝 Details: ${desc}%0A📲 Accept: ${myWebAppUrl}`;
            await fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${groupChatId}&text=${msg}&parse_mode=Markdown`);
            document.getElementById('areaName').value = ""; document.getElementById('taskDesc').value = "";
            alert("Duty Posted Successfully!");
        }
    };

    // --- REALTIME SYNC ---
    onChildAdded(dutyRef, (snap) => {
        render(snap);
        if (Date.now() - snap.val().timestamp < 10000) {
            audio.play().catch(e => {});
            if (Notification.permission === "granted") {
                new Notification("New Duty!", { body: snap.val().area });
            }
        }
    });
    onChildChanged(dutyRef, (snap) => render(snap));
    onChildRemoved(dutyRef, (snap) => {
        document.getElementById(`f_${snap.key}`)?.remove();
        document.getElementById(`h_${snap.key}`)?.remove();
    });

    function render(snap) {
        const id = snap.key, data = snap.val();
        let f = document.getElementById(`f_${id}`);
        if(!f) { f = document.createElement('div'); f.id = `f_${id}`; f.className='duty-card'; document.getElementById('feedArea').prepend(f); }
        f.innerHTML = `<b style="font-size:18px;">📍 ${data.area}</b><p style="color:#475569;">${data.description}</p>` + 
            (data.acceptedBy ? `<b style="color:#059669;">✅ Accepted by ${data.acceptedBy}</b>` : 
            `<input id="n_${id}" placeholder="Your Name" style="padding:8px; width:60%;"><button class="accept-btn" onclick="accept('${id}')">Accept</button>`);
        
        let h = document.getElementById(`h_${id}`);
        if(!h) { h = document.createElement('div'); h.id = `h_${id}`; h.className='duty-card'; h.style.borderLeftColor="#94a3b8"; document.getElementById('historyArea').prepend(h); }
        h.innerHTML = `<b>${data.area}</b> - ${data.acceptedBy ? 'Done ✅' : 'Pending'} <button onclick="del('${id}')" style="width:auto; padding:5px 10px; background:#fee2e2; color:#ef4444; float:right;">🗑️</button>`;
    }

    window.accept = (id) => {
        const n = document.getElementById(`n_${id}`).value;
        if(n) update(ref(db, `duties/${id}`), { acceptedBy: n });
        else alert("Enter your name!");
    };

    window.del = (id) => { if(confirm("Delete this duty?")) remove(ref(db, `duties/${id}`)); };

    window.informReady = () => {
        const n = document.getElementById('readyName').value, l = document.getElementById('readyLoc').value;
        if(n && l) window.open(`https://wa.me/${myWhatsApp}?text=DRIVER READY: ${n} from ${l}`);
        else alert("Fill details!");
    };
</script>
</body>
</html>
