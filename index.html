<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Driver Duty Pro</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #1e3a8a, #3b82f6); 
            margin: 0; 
            padding: 15px; 
            display: flex; 
            justify-content: center;
            color: #333;
        }
        .app-container { 
            width: 100%; 
            max-width: 450px; 
            background: white; 
            border-radius: 25px; 
            min-height: 90vh; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            overflow: hidden;
            position: relative;
        }
        section { padding: 20px; }

        /* SELECTION PAGE FIX */
        #selectionPage { 
            text-align: center; 
            padding-top: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .role-btn-container { 
            margin-top: 40px; 
            display: flex; 
            flex-direction: column; 
            gap: 30px; 
            width: 100%;
            align-items: center;
        }
        .round-btn { 
            width: 160px; 
            height: 160px; 
            border-radius: 50%; 
            border: none; 
            color: white; 
            font-weight: bold; 
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* MOBILE TOUCH FIX */
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        #goToAdmin { background: #111827; }
        #goToDriver { background: #16a34a; }

        /* FORM STYLES */
        input, textarea { 
            width: 100%; 
            padding: 15px; 
            margin: 10px 0; 
            border: 2px solid #e5e7eb; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 16px;
        }
        button { 
            width: 100%; 
            padding: 15px; 
            border: none; 
            border-radius: 12px; 
            font-weight: bold; 
            font-size: 16px;
            cursor: pointer;
        }
        #postBtn { background: #2563eb; color: white; }
        #adminBtn { background: #111827; color: white; }
        
        /* DUTY CARDS */
        .duty-card { 
            background: #f9fafb; 
            border-left: 6px solid #2563eb; 
            padding: 15px; 
            margin-bottom: 12px; 
            border-radius: 12px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .accept-btn { background: #16a34a; color: white; width: auto; padding: 10px 20px; }
        .back-btn { background: #f3f4f6; color: #374151; margin-bottom: 10px; width: auto; }
        .ready-card { background: #eff6ff; border: 2px solid #3b82f6; padding: 15px; border-radius: 15px; text-align: center; }
    </style>
</head>
<body>

<div class="app-container">
    
    <div id="selectionPage">
        <h1 style="margin:0;">Driver Duty Pro</h1>
        <p style="color: #6b7280;">Tap your mode to enter</p>
        <div class="role-btn-container">
            <button class="round-btn" id="goToAdmin">
                <span style="font-size:40px;">🎛️</span><br>ADMIN
            </button>
            <button class="round-btn" id="goToDriver">
                <span style="font-size:40px;">𚖇</span><br>DRIVER
            </button>
        </div>
    </div>

    <div id="mainContent" style="display:none;">
        <button class="back-btn" onclick="location.reload()">⬅ Logout / Back</button>

        <section id="adminSection" style="display:none;">
            <h2>Admin Login</h2>
            <div id="adminLoginArea">
                <input type="password" id="passInput" placeholder="Password">
                <button id="adminBtn" onclick="checkPass()">Login</button>
            </div>
            <div id="adminPanel" style="display:none;">
                <input type="text" id="areaName" placeholder="Pickup Area">
                <textarea id="taskDesc" rows="3" placeholder="Duty Details"></textarea>
                <button id="postBtn" onclick="postDuty()">Post & Alert Telegram</button>
                <hr>
                <div id="historyArea"></div>
            </div>
        </section>

        <section id="driverSection" style="display:none;">
            <div class="ready-card">
                <input type="text" id="readyName" placeholder="Your Name">
                <input type="text" id="readyLoc" placeholder="Your Location">
                <button style="background:#16a34a; color:white;" onclick="informReady()">I AM READY</button>
            </div>
            <h3>Live Duty Feed</h3>
            <div id="feedArea"></div>
        </section>
    </div>
</div>

<audio id="notifSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, onChildChanged, onChildRemoved, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAh2o5OHBjOkaaYB9cJu1LoJ8l8KVRcnMA",
        authDomain: "mydriverapp-1c155.firebaseapp.com",
        projectId: "mydriverapp-1c155",
        databaseURL: "https://mydriverapp-1c155-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dutyRef = ref(db, 'duties');
    const audio = document.getElementById('notifSound');

    // CONFIG
    const myWhatsApp = "919500005402";
    const botToken = "8385530049:AAEe6TtUyK7lcjlgz0vzr8u3on61MY3AABo";
    const groupChatId = "-1003800327361";
    const myWebAppUrl = "https://mydriverapp-1c155.firebaseapp.com/";

    // NAVIGATION
    window.showPage = (role) => {
        document.getElementById('selectionPage').style.display = "none";
        document.getElementById('mainContent').style.display = "block";
        if(role === 'admin') document.getElementById('adminSection').style.display = "block";
        else document.getElementById('driverSection').style.display = "block";
    };

    // MOBILE CLICK FIX
    document.getElementById('goToAdmin').onclick = () => window.showPage('admin');
    document.getElementById('goToDriver').onclick = () => window.showPage('driver');

    // ADMIN LOGIN
    window.checkPass = () => {
        if(document.getElementById('passInput').value === "divya") {
            document.getElementById('adminLoginArea').style.display = "none";
            document.getElementById('adminPanel').style.display = "block";
            audio.play().then(() => { audio.pause(); }).catch(e => {});
        } else { alert("Wrong!"); }
    };

    // POST DUTY
    window.postDuty = async () => {
        const area = document.getElementById('areaName').value;
        const desc = document.getElementById('taskDesc').value;
        if(area && desc) {
            push(dutyRef, { area, description: desc, acceptedBy: "", timestamp: Date.now() });
            const msg = `𚖇 *NEW DUTY*%0A📍 Area: ${area}%0A📝 Details: ${desc}%0A📲 Accept: ${myWebAppUrl}`;
            await fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${groupChatId}&text=${msg}&parse_mode=Markdown`);
            document.getElementById('areaName').value = ""; document.getElementById('taskDesc').value = "";
            alert("Posted!");
        }
    };

    // SYNC DATA
    onChildAdded(dutyRef, (snap) => render(snap));
    onChildChanged(dutyRef, (snap) => render(snap));
    onChildRemoved(dutyRef, (snap) => {
        document.getElementById(`f_${snap.key}`)?.remove();
        document.getElementById(`h_${snap.key}`)?.remove();
    });

    function render(snap) {
        const id = snap.key, data = snap.val();
        // Feed
        let f = document.getElementById(`f_${id}`);
        if(!f) { f = document.createElement('div'); f.id = `f_${id}`; f.className='duty-card'; document.getElementById('feedArea').prepend(f); }
        f.innerHTML = `<strong>📍 ${data.area}</strong><p>${data.description}</p>` + 
            (data.acceptedBy ? `✅ ${data.acceptedBy}` : `<input id="n_${id}" placeholder="Name"><button class="accept-btn" onclick="accept('${id}')">Accept</button>`);
        
        // History
        let h = document.getElementById(`h_${id}`);
        if(!h) { h = document.createElement('div'); h.id = `h_${id}`; h.className='duty-card'; document.getElementById('historyArea').prepend(h); }
        h.innerHTML = `📍 ${data.area} ${data.acceptedBy ? '✅' : '⏳'} <button onclick="del('${id}')">🗑️</button>`;
    }

    window.accept = (id) => {
        const n = document.getElementById(`n_${id}`).value;
        if(n) update(ref(db, `duties/${id}`), { acceptedBy: n });
    };

    window.del = (id) => { if(confirm("Delete?")) remove(ref(db, `duties/${id}`)); };

    window.informReady = () => {
        const n = document.getElementById('readyName').value, l = document.getElementById('readyLoc').value;
        if(n && l) window.open(`https://wa.me/${myWhatsApp}?text=READY: ${n} @ ${l}`);
    };
</script>
</body>
</html>
